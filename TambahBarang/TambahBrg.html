<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <title>Dashboard Tambah Mobil</title>
</head>
<body class="bg-slate-900 font-sans flex h-screen overflow-hidden">
    <!--NAVBAR SAMPING-->
    <aside class="w-[260px] bg-gradient-to-b from-[#3a0606] to-[#170101] text-[#94a3b8] h-screen flex flex-col shrink-0 border-r border-red-900/50">
        <!---->
        <div class="py-6 px-6">
            <h1 class="text-2xl font-bold text-white">ECLIPSE</h1>
        </div>
        <!---->
        <div class="px-6 py-2 text-[11px] font-semibold tracking-wider uppercase text-slate-500 mt-2">
            Layouts &amp; Pages
        </div>
        <!---->
        <a href="../dashboard/dashboard.html" class="flex items-center gap-3 px-4 py-3 mx-3 mb-2 text-white transition-all duration-300 rounded-xl hover:bg-red-300 hover:text-black hover:shadow-[0_0_15px_#ef4444,0_0_30px_rgba(239,68,68,0.6)]">
            <i class="fas fa-home w-5 text-center"></i>
            <span class="font-medium">Dashboard</span>
        </a>
        <!---->
        <a href="../dashbarang/dashbarangfix.html" class="flex items-center gap-3 px-4 py-3 mx-3 mb-2 bg-red-500 text-white transition-all duration-300 rounded-xl hover:bg-red-300 hover:text-black hover:shadow-[0_0_15px_#ef4444,0_0_30px_rgba(239,68,68,0.6)]">
            <i class="fas fa-home w-5 text-center"></i>
            <span class="font-medium">Atur Barang</span>
        </a>
        <!---->
        <div class="mt-auto mb-4 px-6">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white rounded-lg transition-colors group">
                <i class="fas fa-sign-out-alt"></i>
                <span class="font-medium">Logout</span>
            </a>
        </div>
    </aside>

    <!--NAVBAR ATAS-->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto relative">
        <!---->
        <div class="w-full pt-6 pb-2 sticky top-0 z-50">
            <!---->
            <nav class="w-[90%] max-w-[1200px] mx-auto px-10 py-4 flex items-center justify-between bg-white/10 border border-white/10 rounded-[60px] backdrop-blur-md shadow-[0_8px_32px_rgba(0,0,0,0.3)]">
                <!---->
                <div>
                    <img src="../AboutUS/img/LogoProfile.png" alt="logo" class="w-10 h-10 rounded-full overflow-hidden cursor-pointer transition duration-300 hover:scale-110">
                </div>

                <div class="relative flex items-center gap-[18px]">
                    <a href="../home/home.html" class="relative z-10 w-[105px] h-[45px] flex items-center justify-center rounded-[14px] text-white font-semibold text-[18px] transition duration-300 hover:bg-sky-400 hover:text-white hover:shadow-[0_0_15px_#38bdf8,0_0_30px_rgba(56,189,248,0.6)] hover:[text-shadow:0_0_5px_#38bdf8,0_0_10px_#38bdf8,0_0_20px_#38bdf8]">
                        Home
                    </a>
                    <a href="../Product-Detailed/product.html" class="relative z-10 w-[105px] h-[45px] flex items-center justify-center rounded-[14px] text-white font-semibold text-[18px] transition duration-300 hover:bg-sky-400 hover:text-white hover:shadow-[0_0_15px_#38bdf8,0_0_30px_rgba(56,189,248,0.6)] hover:[text-shadow:0_0_5px_#38bdf8,0_0_10px_#38bdf8,0_0_20px_#38bdf8]">
                        Product
                    </a>
                    <a  href="../contact/Contact.html" class="relative z-10 w-[105px] h-[45px] flex items-center justify-center rounded-[14px] text-white font-semibold text-[18px] transition duration-300 hover:bg-sky-400 hover:text-white hover:shadow-[0_0_15px_#38bdf8,0_0_30px_rgba(56,189,248,0.6)] hover:[text-shadow:0_0_5px_#38bdf8,0_0_10px_#38bdf8,0_0_20px_#38bdf8]">
                        Contact
                    </a>
                    <a href="../aboutus/AboutUs.html" class="relative z-10 w-[105px] h-[45px] flex items-center justify-center rounded-[14px] text-white font-semibold text-[18px] transition duration-300 hover:bg-sky-400 hover:text-white hover:shadow-[0_0_15px_#38bdf8,0_0_30px_rgba(56,189,248,0.6)] hover:[text-shadow:0_0_5px_#38bdf8,0_0_10px_#38bdf8,0_0_20px_#38bdf8]">
                        About us
                    </a>
                </div>

                <div class="flex gap-5">
                    <a href="../login/login.html">
                        <img src="../AboutUS/img/user2.png" alt="user" class="w-8 h-8 cursor-pointer transition duration-300 invert hover:scale-110 hover:drop-shadow-[0_0_10px_#38bdf8]">
                    </a>
                    <a href="../cart/cart.html">
                        <img src="../AboutUS/img/shopping-bag.png" alt="cart" class="w-8 h-8 cursor-pointer transition duration-300 invert hover:scale-110 hover:drop-shadow-[0_0_10px_#38bdf8]">
                    </a>
                </div>
            </nav>
        </div>

        <div class="w-[90%] max-w-[1200px] mx-auto mt-6 mb-12 text-white flex-1 flex flex-col">
            <h2 class="text-2xl font-medium mb-6">Tambah Mobil</h2>
            <form action="#" class="flex flex-col gap-6">
                <div class="flex flex-col lg:flex-row gap-8">                    
                    <div class="w-full lg:w-[280px]">
                        <!--Border non aktif, kode= border-[3px] border-slate-400-->
                        <div class="w-full h-[180px] bg-transparent flex items-center justify-center hover:border-sky-400 transition-colors cursor-pointer group">
                            <img class="font-medium text-slate-300 group-hover:text-sky-400 transition-colors" src="./img/lotuselise.webp"></img>
                        </div>
                    </div>
                    <div class="w-full lg:flex-1 flex flex-col gap-6">                       
                        <div class="w-full border-[3px] border-slate-400 bg-transparent p-4 focus-within:border-sky-400 transition-colors">
                            <input type="text" placeholder="Nama Produk" class="w-full bg-transparent outline-none text-white placeholder-slate-400">
                        </div>
                        <div class="w-full h-[180px] border-[3px] border-slate-400 bg-transparent p-4 focus-within:border-sky-400 transition-colors">
                            <textarea placeholder="Deskripsi Produk" class="w-full h-full bg-transparent outline-none text-white resize-none placeholder-slate-400"></textarea>
                        </div>
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-6 pt-2">                            
                            <div class="w-full sm:w-[280px] border-[3px] border-slate-400 bg-transparent p-4 focus-within:border-sky-400 transition-colors">
                                <input type="text" placeholder="*Harga barang" class="w-full bg-transparent outline-none text-white placeholder-slate-400">
                            </div>
                            <button type="submit" class="border-[3px] border-slate-400 rounded-2xl bg-transparent text-white font-bold py-3 px-8 hover:bg-sky-500 hover:border-sky-500 transition-all cursor-pointer whitespace-nowrap">
                                Tambah Barang
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
